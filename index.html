<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DRRR Safe House</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap');

  body { font-family: 'Poppins', sans-serif; text-align: center; margin: 0; padding: 0; background-color: #1a1a2e; color: white; overflow-x: hidden; min-height: 100vh; }
  h1, h2 { margin-bottom: 10px; }

  .btn { padding: 15px 30px; margin: 10px; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 8px; border: none; transition: transform 0.15s, box-shadow 0.15s; color: white; }
  .btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  .btn:active:not(:disabled) { transform: translateY(0); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-blue { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
  .btn-green { background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%); color: #111; }
  .btn-red { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); }
  .btn-gray { background: #3a3a55; }

  input { padding: 12px; font-size: 16px; border-radius: 6px; border: 2px solid #4facfe; background: #16213e; color: white; margin: 5px; outline: none; text-align: center; }
  input[type="color"] { padding: 0; height: 50px; width: 50px; border-radius: 50%; cursor: pointer; border: 2px solid white; }

  #setup, #hostView, #lobbyStep1, #lobbyStep2, #clientController, #clientWaiting { display: none; padding: 20px; box-sizing: border-box; }
  #setup { display: block; margin-top: 10vh; }

  .host-layout { display: flex; justify-content: center; align-items: flex-start; gap: 20px; max-width: 1200px; margin: 0 auto; flex-wrap: wrap; }
  canvas { background: linear-gradient(to bottom, #0f2027, #203a43, #2c5364); border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 100%; }

  .sidebar { background: #16213e; padding: 20px; border-radius: 10px; width: 260px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-height: 560px; overflow-y: auto; }
  .player-card { background: #0f3460; padding: 10px; border-radius: 6px; margin-bottom: 10px; border-left: 5px solid white; transition: opacity 0.3s; }
  .player-card.dead { opacity: 0.5; filter: grayscale(100%); border-left-color: red; }
  .player-card .row1 { display: flex; justify-content: space-between; align-items: center; }
  .bar-track { background: #051022; border-radius: 4px; height: 8px; margin-top: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .room-code-display { font-size: 32px; font-weight: bold; color: #4facfe; letter-spacing: 4px; background: #0f3460; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center;}

  .event-bar { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 15px; }
  .event-btn { flex: 1 1 130px; padding: 12px 8px; font-size: 15px; }

  .roles-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 10px; max-width: 600px; margin: 20px auto; }
  .role-card { background: #0f3460; padding: 15px 5px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: 0.2s; font-size: 14px; position: relative; }
  .role-icon { font-size: 28px; margin-bottom: 5px; display: block; }
  .role-card:hover:not(.taken) { border-color: #4facfe; transform: scale(1.05); }
  .role-card.selected { border-color: #43e97b; background: #1a4f40; box-shadow: 0 0 10px #43e97b; }
  .role-card.taken { background: #333; color: #888; cursor: not-allowed; opacity: 0.7; }
  .taken-by { font-size: 11px; color: #ffb199; margin-top: 5px; display: block; font-weight: bold; }

  .controls { display: flex; justify-content: center; gap: 20px; margin-top: 50px; }
  .ctrl-btn { width: 80px; height: 80px; font-size: 30px; border-radius: 50%; background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  .ctrl-btn:active { transform: scale(0.9); }

  .lobby-list { max-width: 500px; margin: 20px auto; text-align: left; }
  .lobby-player { background: #0f3460; padding: 10px 15px; border-radius: 6px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
  .swatch { width: 18px; height: 18px; border-radius: 50%; display: inline-block; }
  .pulse { animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<!-- Screen: Pick Host or Player -->
<div id="setup">
  <h1 style="font-size: 3em; margin-bottom: 0;">DRRR Survival</h1>
  <p style="color: #4facfe; margin-bottom: 40px;">The Safe House Icebreaker</p>
  <button class="btn btn-blue" onclick="setHost()">Start as Host (Projector)</button>
  <button class="btn btn-green" onclick="setPlayer()">Join as Player (Phone)</button>
</div>

<!-- HOST VIEW -->
<div id="hostView">
  <div style="text-align: center; margin-bottom: 10px;">
    <p style="margin: 0; color: #888; text-transform: uppercase; font-size: 12px;">Join Code</p>
    <div class="room-code-display" id="hostRoomCode">----</div>
  </div>

  <!-- Host Lobby (Intermission) -->
  <div id="hostLobby">
    <h2>Waiting Room</h2>
    <p style="color: #aaa;">Players can join now. Start whenever everyone's ready — no rush!</p>
    <div class="lobby-list" id="lobbyPlayerList"></div>
    <button class="btn btn-green" id="startGameBtn" onclick="startGame()" disabled>▶ Start Game</button>
  </div>

  <!-- Host Active Game -->
  <div id="hostGame" style="display:none;">
    <div class="host-layout">
      <div>
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div class="event-bar">
          <button class="btn btn-red event-btn" onclick="triggerEvent('earthquake')">🌍 Earthquake</button>
          <button class="btn btn-red event-btn" onclick="triggerEvent('typhoon')">🌪️ Typhoon</button>
          <button class="btn btn-red event-btn" onclick="triggerEvent('tsunami')">🌊 Tsunami</button>
          <button class="btn btn-red event-btn" onclick="triggerEvent('meteor')">☄️ Meteor Strike</button>
        </div>
      </div>
      <div class="sidebar">
        <h3>Survivors</h3>
        <div id="sidebarPlayers"></div>
        <button class="btn btn-gray" style="width:100%; margin-top: 10px; font-size: 14px; padding: 10px;" onclick="resetGame()">↺ Reset Game</button>
      </div>
    </div>
  </div>
</div>

<!-- PLAYER LOBBY STEP 1: Enter Code -->
<div id="lobbyStep1">
  <h2>Enter Room Code</h2>
  <input type="text" id="joinCode" placeholder="4-Letter Code" maxlength="4" style="text-transform: uppercase; font-size: 24px; letter-spacing: 5px;"><br>
  <p id="step1Error" style="color: #ffb199; height: 20px;"></p>
  <button class="btn btn-blue" onclick="verifyCode()">Next ➡️</button>
</div>

<!-- PLAYER LOBBY STEP 2: Character Creation -->
<div id="lobbyStep2">
  <h2>Setup Profile</h2>
  <input type="text" id="playerName" placeholder="Your Name" maxlength="12"><br>

  <p>Pick your Stickman Color:</p>
  <input type="color" id="playerColor" value="#43e97b"><br>

  <p>Select your Role:</p>
  <div class="roles-grid" id="rolesContainer"></div>

  <p id="step2Error" style="color: #ffb199; height: 20px;"></p>
  <button class="btn btn-green" style="width: 100%; max-width: 300px;" onclick="attemptJoin()">JOIN GAME</button>
</div>

<!-- PLAYER: Waiting for host to start -->
<div id="clientWaiting">
  <h2 class="pulse">You're in! 🎉</h2>
  <p id="waitingName" style="color: #4facfe; font-size: 20px;"></p>
  <p style="color: #aaa;">Waiting for the host to start the game...</p>
</div>

<!-- PLAYER CONTROLLER -->
<div id="clientController">
  <h2 id="controllerName">Survivor</h2>
  <h3 id="controllerRole" style="color: #4facfe; margin-top: -10px;"></h3>
  <p id="controllerStats" style="color: #aaa;"></p>
  <div class="controls">
    <button class="ctrl-btn" onclick="move('left')">⬅️</button>
    <button class="ctrl-btn" onclick="move('jump')">⬆️</button>
    <button class="ctrl-btn" onclick="move('right')">➡️</button>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let playersData = {};
  let selectedRoleId = null;
  let storedJoinCode = "";
  let myId = null;

  let gameStarted = false;
  let activeEvent = null;   // { id, name, icon, duration, hint }
  let eventEndsAt = 0;
  let particles = [];
  let waterLevel = 0;       // 0..1 for tsunami
  let shakeAmount = 0;      // for earthquake

  const HOUSE = { groundY: 450, roofY: 100, leftX: 50, rightX: 750, floor2Y: 280 };

  // --- SCREEN SWITCHING ---
  function showOnly(id) {
    ['setup','hostView','lobbyStep1','lobbyStep2','clientWaiting','clientController'].forEach(s => {
      document.getElementById(s).style.display = (s === id) ? 'block' : 'none';
    });
  }

  function setHost() {
    showOnly('hostView');
    socket.emit('requestHostData');
    requestAnimationFrame(gameLoop);
  }

  function setPlayer() {
    showOnly('lobbyStep1');
  }

  // --- HOST LOGIC ---
  socket.on('hostData', (data) => {
    document.getElementById('hostRoomCode').innerText = data.roomCode;
    gameStarted = data.gameStarted;
    document.getElementById('hostLobby').style.display = gameStarted ? 'none' : 'block';
    document.getElementById('hostGame').style.display = gameStarted ? 'block' : 'none';
  });

  socket.on('updatePlayers', (data) => {
    playersData = data;
    updateSidebar();
    updateLobbyList();
    const count = Object.keys(playersData).length;
    document.getElementById('startGameBtn').disabled = count === 0;
  });

  function updateLobbyList() {
    const list = document.getElementById('lobbyPlayerList');
    if (!list) return;
    list.innerHTML = '';
    const ids = Object.keys(playersData);
    if (ids.length === 0) {
      list.innerHTML = '<p style="color:#888;">No one has joined yet — share the room code!</p>';
      return;
    }
    ids.forEach(id => {
      const p = playersData[id];
      list.innerHTML += `
        <div class="lobby-player">
          <span class="swatch" style="background:${p.color}"></span>
          <strong>${p.name}</strong>
          <span style="color:#aaa;">${p.roleIcon} ${p.roleName}</span>
        </div>`;
    });
  }

  function updateSidebar() {
    const sidebar = document.getElementById('sidebarPlayers');
    if (!sidebar) return;
    sidebar.innerHTML = '';
    for (let id in playersData) {
      let p = playersData[id];
      let statusClass = p.isAlive ? '' : 'dead';
      sidebar.innerHTML += `
        <div class="player-card ${statusClass}" style="border-left-color: ${p.color}">
          <div class="row1">
            <div><strong>${p.name}</strong><br><span style="font-size:12px;color:#aaa;">${p.roleIcon} ${p.roleName}</span></div>
            <div style="font-size:11px;font-weight:bold;">${p.isAlive ? '' : 'ELIMINATED'}</div>
          </div>
          <div style="font-size:11px;color:#aaa;margin-top:6px;">❤️ Health ${p.health}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${p.health}%; background:#ff0844;"></div></div>
          <div style="font-size:11px;color:#aaa;margin-top:6px;">🍞 Hunger ${p.hunger}</div>
          <div class="bar-track"><div class="bar-fill" style="width:${p.hunger}%; background:#43e97b;"></div></div>
        </div>`;
    }
  }

  function startGame() { socket.emit('startGame'); }

  socket.on('gameStarted', () => {
    gameStarted = true;
    const lobby = document.getElementById('hostLobby');
    const game = document.getElementById('hostGame');
    if (lobby) lobby.style.display = 'none';
    if (game) game.style.display = 'block';
    // If this client is a player, switch them to the controller
    if (document.getElementById('clientWaiting').style.display === 'block') {
      showOnly('clientController');
    }
  });

  function resetGame() { socket.emit('resetGame'); }
  socket.on('gameReset', () => { location.reload(); });

  function triggerEvent(id) { socket.emit('triggerEvent', id); }

  socket.on('eventStart', (ev) => {
    activeEvent = ev;
    eventEndsAt = Date.now() + ev.duration;
    particles = [];
    waterLevel = 0;
    shakeAmount = 0;
  });

  socket.on('eventEnd', () => {
    activeEvent = null;
    particles = [];
    waterLevel = 0;
    shakeAmount = 0;
  });

  // --- CLIENT (PLAYER) UI LOGIC ---
  function verifyCode() {
    const code = document.getElementById('joinCode').value.trim();
    if (!code) {
      document.getElementById('step1Error').innerText = "Please enter a code!";
      return;
    }
    storedJoinCode = code;
    socket.emit('verifyRoom', code);
  }

  socket.on('roomVerified', (roles) => {
    showOnly('lobbyStep2');
    renderRoles(roles);
  });

  socket.on('joinError', (msg) => {
    const e1 = document.getElementById('step1Error');
    const e2 = document.getElementById('step2Error');
    if (e1) e1.innerText = msg;
    if (e2) e2.innerText = msg;
  });

  socket.on('updateRoles', (roles) => {
    if (document.getElementById('lobbyStep2').style.display === 'block') {
      renderRoles(roles);
    }
  });

  function renderRoles(roles) {
    const container = document.getElementById('rolesContainer');
    container.innerHTML = '';
    roles.forEach(role => {
      const div = document.createElement('div');
      div.className = 'role-card';
      let content = `<span class="role-icon">${role.icon}</span><strong>${role.name}</strong>`;
      if (role.takenBy) {
        div.classList.add('taken');
        div.innerHTML = content + `<span class="taken-by">${role.takenBy}</span>`;
      } else {
        div.innerHTML = content;
        if (selectedRoleId === role.id) div.classList.add('selected');
        div.onclick = () => {
          selectedRoleId = role.id;
          document.querySelectorAll('.role-card').forEach(c => c.classList.remove('selected'));
          div.classList.add('selected');
        };
      }
      container.appendChild(div);
    });
  }

  function attemptJoin() {
    const name = document.getElementById('playerName').value.trim();
    const color = document.getElementById('playerColor').value;
    const errorMsg = document.getElementById('step2Error');
    if (!name) return errorMsg.innerText = "Please enter your name!";
    if (!selectedRoleId) return errorMsg.innerText = "Please select an available role!";
    socket.emit('joinGame', { code: storedJoinCode, name, color, roleId: selectedRoleId });
  }

  socket.on('joinSuccess', (me) => {
    myId = me.id;
    document.getElementById('waitingName').innerText = `${me.name} — ${me.roleIcon} ${me.roleName}`;
    document.getElementById('controllerName').innerText = me.name;
    document.getElementById('controllerRole').innerText = `${me.roleIcon} ${me.roleName}`;
    showOnly('clientWaiting');
  });

  socket.on('updatePlayers', (data) => {
    if (myId && data[myId]) {
      const me = data[myId];
      const stats = document.getElementById('controllerStats');
      if (stats) stats.innerText = `❤️ ${me.health}   🍞 ${me.hunger}` + (me.isAlive ? '' : '   💀 Eliminated');
    }
  });

  function move(direction) { socket.emit('move', direction); }

  // --- HOST CANVAS RENDER LOOP ---
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  function drawHouse() {
    // ground
    ctx.fillStyle = '#4a3b32';
    ctx.fillRect(0, HOUSE.groundY, 800, 50);
    // house frame
    ctx.strokeStyle = '#c9a66b';
    ctx.lineWidth = 6;
    ctx.beginPath();
    ctx.moveTo(HOUSE.leftX, HOUSE.groundY);
    ctx.lineTo(HOUSE.leftX, HOUSE.roofY + 100);
    ctx.lineTo(400, HOUSE.roofY);
    ctx.lineTo(HOUSE.rightX, HOUSE.roofY + 100);
    ctx.lineTo(HOUSE.rightX, HOUSE.groundY);
    ctx.stroke();
    // second floor divider (double-story house)
    ctx.strokeStyle = 'rgba(201,166,107,0.5)';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(HOUSE.leftX, HOUSE.floor2Y);
    ctx.lineTo(HOUSE.rightX, HOUSE.floor2Y);
    ctx.stroke();
    // a couple windows for flavor
    ctx.fillStyle = 'rgba(255,220,120,0.25)';
    ctx.fillRect(150, 340, 60, 60);
    ctx.fillRect(590, 340, 60, 60);
    ctx.fillRect(150, 170, 60, 60);
    ctx.fillRect(590, 170, 60, 60);
  }

  function drawStickman(p) {
    const legLift = (Date.now() < p.jumpUntil) ? 30 : 0;
    const feetY = HOUSE.groundY - legLift;
    const headY = feetY - 55;

    ctx.strokeStyle = p.color;
    ctx.fillStyle = p.color;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';

    // head
    ctx.beginPath();
    ctx.arc(p.x, headY, 10, 0, Math.PI * 2);
    ctx.fill();
    // body
    ctx.beginPath();
    ctx.moveTo(p.x, headY + 10);
    ctx.lineTo(p.x, headY + 40);
    ctx.stroke();
    // arms
    ctx.beginPath();
    ctx.moveTo(p.x - 15, headY + 20);
    ctx.lineTo(p.x + 15, headY + 20);
    ctx.stroke();
    // legs
    ctx.beginPath();
    ctx.moveTo(p.x, headY + 40);
    ctx.lineTo(p.x - 12, feetY);
    ctx.moveTo(p.x, headY + 40);
    ctx.lineTo(p.x + 12, feetY);
    ctx.stroke();

    if (!p.isAlive) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(p.x - 25, headY - 15, 50, 90);
    }

    // name + role tag
    ctx.fillStyle = 'white';
    ctx.font = 'bold 12px Poppins, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${p.roleIcon} ${p.name}`, p.x, headY - 20);
  }

  function drawEventEffects() {
    if (!activeEvent) return;
    const remaining = Math.max(0, eventEndsAt - Date.now());
    const progress = 1 - remaining / activeEvent.duration;

    if (activeEvent.id === 'earthquake') {
      shakeAmount = 6;
    } else if (activeEvent.id === 'typhoon') {
      if (Math.random() < 0.5) {
        particles.push({ x: -10, y: Math.random() * 400 + 50, vx: Math.random() * 6 + 6, len: Math.random() * 20 + 10 });
      }
      ctx.strokeStyle = 'rgba(200,220,255,0.6)';
      ctx.lineWidth = 2;
      particles.forEach(pt => {
        ctx.beginPath();
        ctx.moveTo(pt.x, pt.y);
        ctx.lineTo(pt.x - pt.len, pt.y - pt.len / 3);
        ctx.stroke();
        pt.x += pt.vx;
        pt.y += pt.vx / 4;
      });
      particles = particles.filter(pt => pt.x < 850);
    } else if (activeEvent.id === 'tsunami') {
      waterLevel = Math.min(0.55, progress * 0.6);
      const waterY = HOUSE.groundY - waterLevel * (HOUSE.groundY - HOUSE.roofY);
      ctx.fillStyle = 'rgba(40,110,180,0.55)';
      ctx.fillRect(0, waterY, 800, HOUSE.groundY - waterY + 50);
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      for (let x = 0; x <= 800; x += 20) {
        ctx.lineTo(x, waterY + Math.sin((x + Date.now() / 100) / 30) * 4);
      }
      ctx.stroke();
    } else if (activeEvent.id === 'meteor') {
      if (Math.random() < 0.15) {
        particles.push({ x: Math.random() * 700 + 50, y: -20, speed: Math.random() * 5 + 6 });
      }
      ctx.fillStyle = '#ff8c42';
      particles.forEach(m => {
        ctx.beginPath();
        ctx.arc(m.x, m.y, 8, 0, Math.PI * 2);
        ctx.fill();
        m.y += m.speed;
      });
      particles = particles.filter(m => m.y < HOUSE.groundY);
    }

    // banner
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 10, 800, 30);
    ctx.fillStyle = '#ffb199';
    ctx.font = 'bold 16px Poppins, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(`${activeEvent.icon} ${activeEvent.name.toUpperCase()} — ${activeEvent.hint || ''}`, 400, 31);
    ctx.restore();

    if (remaining <= 0) shakeAmount = 0;
  }

  function gameLoop() {
    ctx.save();
    ctx.clearRect(0, 0, 800, 500);

    if (activeEvent && activeEvent.id === 'earthquake') {
      ctx.translate((Math.random() - 0.5) * shakeAmount, (Math.random() - 0.5) * shakeAmount);
    }

    drawHouse();
    for (let id in playersData) drawStickman(playersData[id]);
    drawEventEffects();

    ctx.restore();
    requestAnimationFrame(gameLoop);
  }
</script>
</body>
</html>
