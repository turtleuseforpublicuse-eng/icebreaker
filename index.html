<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>DRRR Safe House</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <!-- Global Warning Overlay -->
  <div id="warning-overlay" class="hidden-overlay">
    <div class="warning-box">
      <h1 id="warning-title">⚠ DISASTER INCOMING!</h1>
      <p id="warning-sub">Prepare your shelter!</p>
    </div>
  </div>

  <!-- Main UI Container -->
  <div id="app">
    <!-- View Mode: Host Projector vs Controller -->
    <header>
      <h2>DRRR Safe House <span id="round-display">Round 1 / 10</span></h2>
      <div id="lookout-banner" class="lookout-toast hidden"></div>
    </header>

    <main class="dashboard">
      <!-- Bars Display Section -->
      <section class="status-panel">
        <div class="stat-group">
          <label>Health</label>
          <div class="progress-bar"><div id="hp-bar-fill" class="fill hp"></div></div>
          <span id="hp-num" class="ascii-bar">██████████ 100</span>
        </div>

        <div class="stat-group">
          <label>Food</label>
          <div class="progress-bar"><div id="food-bar-fill" class="fill food"></div></div>
          <span id="food-num" class="ascii-bar">██████████ 100</span>
        </div>

        <div class="stat-group">
          <label>🏠 Shelter Integrity</label>
          <div class="progress-bar"><div id="shelter-bar-fill" class="fill shelter"></div></div>
          <span id="shelter-num" class="ascii-bar">██████████ 100%</span>
        </div>
      </section>

      <!-- Role Switcher Panel -->
      <section class="role-panel">
        <p>Current Role: <strong id="current-role-label">Caretaker</strong></p>
        <button id="swap-role-btn" class="btn">Request Role Swap</button>
      </section>

      <!-- Controller Inputs -->
      <section id="mobile-controller" class="controller-zone">
        <div class="dpad">
          <button class="dpad-btn up" id="btn-up">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12 4l-8 8h16z"/></svg>
          </button>
          <div class="dpad-row">
            <button class="dpad-btn left" id="btn-left">
              <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M4 12l8-8v16z"/></svg>
            </button>
            <button class="dpad-btn right" id="btn-right">
              <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M20 12l-8-8v16z"/></svg>
            </button>
          </div>
          <button class="dpad-btn down" id="btn-down">
            <svg width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M12 20l8-8H4z"/></svg>
          </button>
        </div>

        <div class="action-buttons">
          <button class="action-btn jump" id="btn-jump">JUMP</button>
          <button class="action-btn interact" id="btn-action">INTERACT</button>
        </div>
      </section>
    </main>
  </div>

  <!-- Role Swap Prompt Modal -->
  <div id="swap-modal" class="modal hidden">
    <div class="modal-content">
      <h3>Role Swap Request</h3>
      <p id="swap-modal-text">Player X wants to swap roles with you.</p>
      <div class="modal-actions">
        <button id="swap-accept-btn" class="btn btn-success">Accept</button>
        <button id="swap-decline-btn" class="btn btn-danger">Decline</button>
      </div>
    </div>
  </div>

  <script src="js/game.js"></script>
</body>
</html>
